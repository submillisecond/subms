name: release

on:
  push:
    tags: ['v*']

# Tag push -> crates.io publish + Maven Central deploy + GitHub Release with
# auto-generated notes + floating major tag updated. Versions in Cargo.toml /
# pom.xml MUST match the tag (e.g. tag v0.3.0 requires both manifests at 0.3.0).
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN     crates.io API token (https://crates.io/me)
#   OSSRH_USERNAME           Sonatype Central username
#   OSSRH_TOKEN              Sonatype Central user token (NOT the password)
#   MAVEN_GPG_KEY            ASCII-armored PGP private key (gpg --export-secret-keys --armor <id>)
#   MAVEN_GPG_PASSPHRASE     passphrase for the GPG key

permissions:
  contents: write     # required to create releases + force-push the floating major tag

jobs:
  verify-tag-matches-manifest:
    name: tag matches Cargo.toml / pom.xml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract + cross-check version
        id: tag
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if echo "$VER" | grep -q -- '-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          CARGO_VER=$(grep -E '^version\s*=' rust/Cargo.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          POM_VER=$(grep -m1 '<version>' java/pom.xml | sed -E 's/.*<version>(.*)<\/version>.*/\1/')

          echo "tag=$VER cargo=$CARGO_VER pom=$POM_VER"
          if [ "$CARGO_VER" != "$VER" ] || [ "$POM_VER" != "$VER" ]; then
            echo "::error::Tag v$VER does not match Cargo.toml ($CARGO_VER) or pom.xml ($POM_VER). Bump manifests before tagging."
            exit 1
          fi

  publish-rust:
    name: publish to crates.io
    needs: verify-tag-matches-manifest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: cargo test (final pre-publish gate)
        run: cargo test --all-features

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

      - name: Summary
        if: always()
        env:
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
        run: |
          {
            echo "## Rust publish"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo ":white_check_mark: \`subms ${VER}\` published to crates.io"
              echo ""
              echo "- [View on crates.io](https://crates.io/crates/subms/${VER})"
              echo "- [Docs on docs.rs](https://docs.rs/subms/${VER})"
            else
              echo ":x: cargo publish failed - review logs above"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish-java:
    name: deploy to Maven Central
    needs: verify-tag-matches-manifest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: mvn deploy
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -P release deploy -DskipTests

      - name: Summary
        if: always()
        env:
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
        run: |
          {
            echo "## Java publish (staged)"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo ":white_check_mark: \`com.submillisecond:subms:${VER}\` uploaded to Sonatype Central as a **staged deployment**"
              echo ""
              echo "**Manual step required:** log in to the portal and release the staged artifact."
              echo ""
              echo "- [Sonatype Central deployments dashboard](https://central.sonatype.com/publishing) - click **Publish** on the staged \`com.submillisecond:subms:${VER}\` deployment to ship it. Click **Drop** to roll back instead."
              echo "- [Maven Central artifact page](https://central.sonatype.com/artifact/com.submillisecond/subms/${VER}) - 200 once the staged deployment is published."
            else
              echo ":x: mvn deploy failed - review logs above. The staged deployment (if any) can be dropped from the [Central deployments dashboard](https://central.sonatype.com/publishing)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  github-release:
    name: GitHub Release + floating major tag
    needs: [publish-rust, publish-java, verify-tag-matches-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease == 'true' }}

      - name: Update floating major tag
        if: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease == 'false' }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR=$(echo "$TAG" | sed -E 's/^v([0-9]+).*/v\1/')
          if [ "$MAJOR" = "$TAG" ]; then
            echo "tag $TAG doesn't match v<major>.<minor>.<patch>; skipping floater"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force

      - name: Summary
        if: always()
        env:
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
          PRE: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease }}
        run: |
          {
            echo "## Release v${VER}"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo ":white_check_mark: GitHub Release created with auto-generated notes"
              if [ "${PRE}" = "false" ]; then
                MAJOR="v$(echo "${VER}" | cut -d. -f1)"
                echo ":white_check_mark: Floating major tag \`${MAJOR}\` moved to this SHA - consumers tracking \`@${MAJOR}\` are now on \`v${VER}\`"
              else
                echo ":information_source: Pre-release; floating major tag not moved"
              fi
              echo ""
              echo "- [Release notes](https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VER})"
              echo ""
              echo "### Next steps"
              echo ""
              echo "1. **Publish the staged Maven deployment** at <https://central.sonatype.com/publishing>."
              echo "2. **Re-run subms-cookbook CI** once both registries serve \`${VER}\` - the cookbook recipe deps will then resolve."
              echo "3. **Update consumers** to pin \`subms = \"${VER}\"\` / \`<version>${VER}</version>\` (or float on \`v$(echo "${VER}" | cut -d. -f1)\` for auto-patches)."
            else
              echo ":x: GitHub Release step failed - review logs above"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
