name: release

on:
  push:
    tags: ['v*']

# Tag push -> crates.io publish + Maven Central deploy + GitHub Release with
# auto-generated notes + floating major tag updated. Versions in Cargo.toml /
# pom.xml MUST match the tag (e.g. tag v0.3.0 requires both manifests at 0.3.0).
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN     crates.io API token (https://crates.io/me)
#   OSSRH_USERNAME           Sonatype Central username
#   OSSRH_TOKEN              Sonatype Central user token (NOT the password)
#   MAVEN_GPG_KEY            ASCII-armored PGP private key (gpg --export-secret-keys --armor <id>)
#   MAVEN_GPG_PASSPHRASE     passphrase for the GPG key

permissions:
  contents: write     # required to create releases + force-push the floating major tag

jobs:
  verify-tag-matches-manifest:
    name: tag matches Cargo.toml / pom.xml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract + cross-check version
        id: tag
        run: bash .github/scripts/release-verify-tag.sh

  publish-rust:
    name: publish to crates.io
    needs: verify-tag-matches-manifest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: cargo test (final pre-publish gate)
        run: cargo test --all-features

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

      - name: Summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
        # working-directory above pins us at rust/; the script lives at repo root.
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/release-summary-rust.sh

  publish-java:
    name: deploy to Maven Central
    needs: verify-tag-matches-manifest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: mvn deploy
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -P release deploy -DskipTests

      - name: Summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/release-summary-java.sh

  github-release:
    name: GitHub Release + floating major tag
    needs: [publish-rust, publish-java, verify-tag-matches-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease == 'true' }}

      - name: Update floating major tag
        if: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease == 'false' }}
        run: bash .github/scripts/release-update-floating-tag.sh

      - name: Summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          VER: ${{ needs.verify-tag-matches-manifest.outputs.version }}
          PRE: ${{ needs.verify-tag-matches-manifest.outputs.is_prerelease }}
        run: bash .github/scripts/release-summary-overall.sh
